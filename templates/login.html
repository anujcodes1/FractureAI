{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<section class="min-h-[85vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md animate-fade-in">

        <!-- Login Card -->
        <div class="bg-medical-card/80 backdrop-blur-xl border border-medical-border/50 rounded-3xl p-8 shadow-2xl">

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <i class="fa-solid fa-right-to-bracket text-2xl text-white"></i>
                </div>
                <h1 class="text-2xl font-display font-bold text-white" data-i18n="login_title">Welcome Back</h1>
                <p class="text-gray-400 text-sm mt-1" data-i18n="login_subtitle">Sign in to your FractureAI account</p>
            </div>

            <!-- Login Form -->
            <form method="POST" action="/login" class="space-y-5" id="login-form">
                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5" data-i18n="username">Username</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" name="username" id="login-username" required
                               class="input-field pl-11"
                               placeholder="Enter your username">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5" data-i18n="password">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="password" name="password" id="login-password" required
                               class="input-field pl-11"
                               placeholder="Enter your password">
                        <button type="button" onclick="togglePassword('login-password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="login-submit-btn" class="w-full py-3.5 rounded-xl font-semibold text-white bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 shadow-lg shadow-cyan-500/20 hover:shadow-cyan-500/30 transition-all duration-300 transform hover:scale-[1.02]">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i>
                    <span data-i18n="login_btn">Sign In</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-medical-border/50"></div>
                <span class="text-xs text-gray-500" data-i18n="or">or</span>
                <div class="flex-1 h-px bg-medical-border/50"></div>
            </div>

            <!-- Signup Link -->
            <p class="text-center text-sm text-gray-400">
                <span data-i18n="no_account">Don't have an account?</span>
                <a href="/signup" class="text-cyan-400 hover:text-cyan-300 font-medium ml-1" data-i18n="signup_link">Sign up</a>
            </p>
        </div>
    </div>
</section>

<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
